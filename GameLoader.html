<script>
function getDailyCode() {
	var d = new Date();
	var year = d.getUTCFullYear().toString().slice(-2); 
	var month = padStart((d.getUTCMonth() + 1), 2, "0");
	var day = padStart(d.getUTCDate(), 2, "0");
	return year + month + day;
}

function padStart(str, targetLength, padString) {
    str = String(str);
    padString = String(padString || ' ');
    while (str.length < targetLength) {
        str = padString + str;
    }
    return str;
}

	document.addEventListener("DOMContentLoaded", function() {
    var select = document.getElementById("bgColorSelect");
    var savedColor = localStorage.getItem("bgColor");
    if(savedColor) {
        document.body.style.backgroundColor = savedColor;
        document.body.style.backgroundImage = "none";
        select.value = savedColor;
    }

    select.addEventListener("change", function() {
        document.body.style.backgroundColor = this.value;
        document.body.style.backgroundImage = "none";
        localStorage.setItem("bgColor", this.value);
    });
});

window.onload = function() {
    var dailyCode = getDailyCode();
    var sw1param = document.getElementById("sw1param");
    if (sw1param) {
        sw1param.value = dailyCode;
    }

    var embed = document.getElementById("shockwaveEmbed");
    if (embed) {
        embed.setAttribute("sw1", dailyCode);
        embed.sw1 = dailyCode;
    }
	
    var select = document.getElementById("bgColorSelect");
    var savedColor = localStorage.getItem("bgColor");
    if (savedColor) {
        document.body.style.backgroundColor = savedColor;
        document.body.style.backgroundImage = "none";
        select.value = savedColor;
    }

    select.addEventListener("change", function() {
        document.body.style.backgroundColor = this.value;
        document.body.style.backgroundImage = "none";
        localStorage.setItem("bgColor", this.value);
    });
};
